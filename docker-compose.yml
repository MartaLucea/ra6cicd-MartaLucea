services:
  web:
    image: php:8.2-apache
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_NAME: taskmanager
      DB_USER: taskuser
      DB_PASS: taskpass
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: taskmanager
      MYSQL_USER: taskuser
      MYSQL_PASSWORD: taskpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data: